<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wordly - English Relay Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap");
      body {
        font-family: "Inter", sans-serif;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #e2e8f0;
        border-radius: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #cbd5e1;
      }
    </style>
  </head>
  <body class="bg-[#f1f5f9] min-h-screen flex items-center justify-center p-6 text-slate-800" onclick="focusInput()">
    <div class="flex gap-6 w-full max-w-5xl h-[700px]">
      <!-- 왼쪽: 메인 게임 섹션 -->
      <div class="flex-1 bg-white rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.05)] border border-white relative overflow-hidden flex flex-col">
        <!-- 게임 헤더 -->
        <div class="p-8 pb-4 flex justify-between items-end">
          <div class="flex flex-col gap-1">
            <div class="flex items-center gap-2 text-indigo-600 font-black text-3xl tracking-tight">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="28"
                height="28"
                viewBox="0 0 24 24"
                fill="currentColor"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-zap fill-indigo-600"
              >
                <path d="M4 14.5 14 3l-2.5 9h8.5L10 21l2.5-9z" />
              </svg>
              <span id="display-level">LEVEL 1</span>
            </div>
            <p class="text-slate-400 text-xs font-bold tracking-widest uppercase">Word Mission</p>
          </div>
          <div class="bg-indigo-50 px-6 py-3 rounded-2xl text-right border border-indigo-100">
            <div class="text-[10px] uppercase tracking-widest font-black text-indigo-400 mb-1">Total Score</div>
            <div id="display-score" class="text-3xl font-black text-indigo-600 leading-none">0</div>
          </div>
        </div>

        <!-- 메인 게임 영역 -->
        <div class="flex-1 flex flex-col items-center justify-center px-12 relative">
          <!-- 오버레이: 시작/종료 -->
          <div
            id="overlay"
            class="absolute inset-0 z-20 bg-white/90 backdrop-blur-md flex flex-col items-center justify-center p-10 text-center animate__animated animate__fadeIn"
          >
            <div
              id="overlay-start-icon"
              class="w-24 h-24 bg-indigo-600 rounded-[2.5rem] flex items-center justify-center mb-8 shadow-2xl shadow-indigo-200 rotate-6"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="44"
                height="44"
                viewBox="0 0 24 24"
                fill="white"
                stroke="white"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polygon points="5 3 19 12 5 21 5 3" />
              </svg>
            </div>
            <div id="overlay-gameover-icon" class="hidden text-yellow-400 mb-6">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="80"
                height="80"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6" />
                <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18" />
                <path d="M4 22h16" />
                <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22" />
                <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22" />
                <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z" />
              </svg>
            </div>
            <h2 id="overlay-title" class="text-4xl font-black mb-4 tracking-tight text-slate-900">Stage Challenge</h2>
            <p id="overlay-desc" class="text-slate-500 mb-10 text-lg">10개 단어마다 레벨이 상승하며<br />시간이 점점 빨라집니다!</p>
            <button
              onclick="startGame()"
              class="w-64 bg-slate-900 hover:bg-indigo-600 text-white font-black py-5 rounded-2xl shadow-xl transition-all active:scale-95 flex items-center justify-center gap-2 group text-xl"
            >
              <span id="btn-text">시작하기</span>
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="group-hover:translate-x-1 transition-transform"
              >
                <path d="m9 18 6-6-6-6" />
              </svg>
            </button>
          </div>

          <!-- 타이머 바 -->
          <div class="w-full h-4 bg-slate-100 rounded-full mb-12 overflow-hidden p-[3px] shadow-inner">
            <div
              id="timer-bar"
              class="h-full rounded-full bg-gradient-to-r from-indigo-600 to-blue-500 transition-all duration-1000 ease-linear"
              style="width: 100%"
            ></div>
          </div>

          <div class="flex flex-col items-center mb-12">
            <p id="progress-text" class="text-slate-300 text-xs mb-4 uppercase tracking-[0.5em] font-black">Progress: 0/10</p>
            <div id="word-display" class="text-8xl font-black text-slate-900 tracking-tighter flex select-none italic">APPLE</div>
          </div>

          <div
            id="message-box"
            class="w-full max-w-sm flex items-center justify-center gap-2 mb-10 px-6 py-4 rounded-2xl text-sm font-bold transition-all border shadow-sm bg-slate-50 text-slate-400 border-slate-100"
          >
            단어를 입력해서 이어나가세요!
          </div>

          <form id="word-form" onsubmit="handleSubmit(event)" class="w-full max-w-md relative group">
            <input
              id="word-input"
              type="text"
              placeholder="로딩 중..."
              autocomplete="off"
              class="w-full bg-slate-50 border-2 border-slate-100 focus:border-indigo-500 focus:bg-white rounded-[2rem] pl-8 pr-20 py-6 transition-all outline-none text-2xl font-bold placeholder:text-slate-300 shadow-sm"
            />
            <button
              type="submit"
              class="absolute right-3 top-3 bottom-3 bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-200 text-white px-6 rounded-[1.5rem] shadow-lg transition-all active:scale-95 flex items-center justify-center"
            >
              <svg
                id="submit-icon"
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <line x1="22" y1="2" x2="11" y2="13" />
                <polygon points="22 2 15 22 11 13 2 9 22 2" />
              </svg>
              <svg
                id="loading-icon"
                class="hidden animate-spin"
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M21 12a9 9 0 1 1-6.219-8.56" />
              </svg>
            </button>
          </form>
        </div>
      </div>

      <!-- 오른쪽: 사이드바 히스토리 -->
      <div class="w-80 bg-white rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.05)] border border-white flex flex-col overflow-hidden">
        <div class="p-8 border-b border-slate-50 flex items-center justify-between bg-slate-50/50">
          <div class="flex items-center gap-2 text-slate-900 font-black text-lg tracking-tight">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="text-indigo-600"
            >
              <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
              <path d="M3 3v5h5" />
              <path d="M12 7v5l4 2" />
            </svg>
            <span>HISTORY</span>
          </div>
          <span id="history-count" class="bg-indigo-100 text-indigo-600 px-3 py-1 rounded-full text-[10px] font-black">0 WORDS</span>
        </div>

        <div id="history-list" class="flex-1 overflow-y-auto p-6 space-y-3 custom-scrollbar">
          <!-- 히스토리 아이템이 여기에 추가됨 -->
        </div>

        <div class="p-6 bg-indigo-600 text-white">
          <div class="flex items-center justify-between text-[10px] font-black uppercase tracking-widest opacity-80 mb-2">
            <span>Current Status</span>
            <span id="status-level">Lvl 1</span>
          </div>
          <div class="h-1.5 bg-white/20 rounded-full overflow-hidden">
            <div id="status-progress-bar" class="h-full bg-white transition-all duration-500" style="width: 0%"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      // 상태 변수들
      let gameState = "START";
      let currentWord = "APPLE";
      let history = ["APPLE"];
      let score = 0;
      let level = 1;
      let maxTime = 15;
      let timeLeft = 15;
      let timerInterval = null;
      let isLoading = false;

      const wordInput = document.getElementById("word-input");
      const wordDisplay = document.getElementById("word-display");
      const messageBox = document.getElementById("message-box");
      const historyList = document.getElementById("history-list");

      // 초기화
      function init() {
        updateWordDisplay();
        renderHistory();

        // 영문 입력 강제 및 자동 포커스
        wordInput.addEventListener("input", (e) => {
          e.target.value = e.target.value.replace(/[^a-zA-Z]/g, "");
        });

        wordInput.addEventListener("blur", () => {
          if (gameState === "PLAYING") setTimeout(focusInput, 10);
        });
      }

      function focusInput() {
        if (gameState === "PLAYING") wordInput.focus();
      }

      function startGame() {
        gameState = "PLAYING";
        currentWord = "APPLE";
        history = ["APPLE"];
        score = 0;
        level = 1;
        maxTime = 15;
        timeLeft = 15;

        document.getElementById("overlay").classList.add("hidden");
        document.getElementById("display-score").innerText = "0";
        document.getElementById("display-level").innerText = "LEVEL 1";
        document.getElementById("status-level").innerText = "Lvl 1";

        updateWordDisplay();
        renderHistory();
        setMessage("첫 단어는 APPLE입니다!", "info");
        startTimer();
        setTimeout(focusInput, 50);
      }

      function startTimer() {
        clearInterval(timerInterval);
        timeLeft = maxTime;
        updateTimerUI();

        timerInterval = setInterval(() => {
          timeLeft -= 1;
          updateTimerUI();
          if (timeLeft <= 0) {
            gameOver();
          }
        }, 1000);
      }

      function updateTimerUI() {
        const bar = document.getElementById("timer-bar");
        const percentage = (timeLeft / maxTime) * 100;
        bar.style.width = percentage + "%";

        if (timeLeft < 5) {
          bar.classList.remove("from-indigo-600", "to-blue-500");
          bar.classList.add("from-red-500", "to-rose-400");
        } else {
          bar.classList.add("from-indigo-600", "to-blue-500");
          bar.classList.remove("from-red-500", "to-rose-400");
        }
      }

      function updateWordDisplay() {
        wordDisplay.innerHTML = "";
        currentWord.split("").forEach((char, i) => {
          const span = document.createElement("span");
          span.innerText = char;
          if (i === currentWord.length - 1) {
            span.className = "text-indigo-600 animate-pulse";
          }
          wordDisplay.appendChild(span);
        });

        const progress = (history.length - 1) % 10;
        document.getElementById("progress-text").innerText = `Progress: ${progress}/10`;
        document.getElementById("status-progress-bar").style.width = progress * 10 + "%";
        wordInput.placeholder = `'${currentWord.slice(-1)}'로 시작하는 단어...`;
      }

      function renderHistory() {
        historyList.innerHTML = "";
        history.forEach((word, i) => {
          const item = document.createElement("div");
          const isLatest = i === 0;
          item.className = `flex items-center justify-between p-4 rounded-2xl transition-all animate__animated animate__slideInRight ${
            isLatest ? "bg-indigo-600 text-white shadow-lg scale-[1.02]" : "bg-slate-50 text-slate-500 border border-slate-100 hover:bg-slate-100"
          }`;

          item.innerHTML = `
                    <div class="flex items-center gap-3">
                        <span class="text-[10px] font-black px-2 py-0.5 rounded-md ${isLatest ? "bg-white/20" : "bg-slate-200 text-slate-400"}">
                            ${history.length - i}
                        </span>
                        <span class="font-bold tracking-tight">${word}</span>
                    </div>
                `;
          historyList.appendChild(item);
        });
        document.getElementById("history-count").innerText = `${history.length - 1} WORDS`;
      }

      function setMessage(text, type) {
        messageBox.innerText = text;
        messageBox.className = `w-full max-w-sm flex items-center justify-center gap-2 mb-10 px-6 py-4 rounded-2xl text-sm font-bold transition-all border shadow-sm `;

        if (type === "error") {
          messageBox.classList.add("bg-rose-50", "text-rose-500", "border-rose-100");
        } else if (type === "success") {
          messageBox.classList.add("bg-emerald-50", "text-emerald-500", "border-emerald-100");
        } else if (type === "level") {
          messageBox.classList.add("bg-indigo-600", "text-white", "border-indigo-500", "scale-105");
        } else {
          messageBox.classList.add("bg-slate-50", "text-slate-400", "border-slate-100");
        }
      }

      async function handleSubmit(e) {
        e.preventDefault();
        if (gameState !== "PLAYING" || isLoading) return;

        const input = wordInput.value.trim().toUpperCase();
        const lastChar = currentWord.slice(-1);

        if (input.length < 2) return showError("두 글자 이상 입력하세요!");
        if (history.includes(input)) return showError("이미 사용한 단어입니다!");
        if (input[0] !== lastChar) return showError(`'${lastChar}'로 시작해야 합니다!`);

        setLoading(true);
        const isValid = await verifyWordAPI(input);
        setLoading(false);

        if (isValid) {
          currentWord = input;
          history.unshift(input);
          score += input.length * 10 * level;

          // 레벨업 체크
          const newLevel = Math.floor((history.length - 1) / 10) + 1;
          if (newLevel > level) {
            level = newLevel;
            maxTime = Math.max(5, 15 - (level - 1) * 2);
            setMessage(`LEVEL UP! ${level}단계 진입!`, "level");
            document.getElementById("display-level").innerText = `LEVEL ${level}`;
            document.getElementById("status-level").innerText = `Lvl ${level}`;
          } else {
            setMessage("참 잘했어요!", "success");
          }

          document.getElementById("display-score").innerText = score;
          wordInput.value = "";
          updateWordDisplay();
          renderHistory();
          startTimer();
          focusInput();
        } else {
          showError("사전에 없는 단어입니다!");
        }
      }

      function showError(msg) {
        setMessage(msg, "error");
        wordInput.value = "";
        focusInput();
      }

      async function verifyWordAPI(word) {
        try {
          const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word.toLowerCase()}`);
          return response.ok;
        } catch {
          return false;
        }
      }

      function setLoading(val) {
        isLoading = val;
        document.getElementById("submit-icon").classList.toggle("hidden", val);
        document.getElementById("loading-icon").classList.toggle("hidden", !val);
      }

      function gameOver() {
        gameState = "GAMEOVER";
        clearInterval(timerInterval);

        const overlay = document.getElementById("overlay");
        overlay.classList.remove("hidden");
        document.getElementById("overlay-start-icon").classList.add("hidden");
        document.getElementById("overlay-gameover-icon").classList.remove("hidden");
        document.getElementById("overlay-title").innerText = "GAME OVER";
        document.getElementById(
          "overlay-desc"
        ).innerHTML = `최종 점수: <span class="text-indigo-600 font-black">${score}</span><br>최종 레벨: ${level}`;
        document.getElementById("btn-text").innerText = "다시 하기";
      }

      window.onload = init;
    </script>
  </body>
</html>
