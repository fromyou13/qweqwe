<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>퀴즈 배틀 - 멀티터치 최적화</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@900&display=swap");
      body { font-family: "Noto Sans KR", sans-serif; user-select: none; overflow: hidden; touch-action: manipulation; }
      @keyframes shake { 0%, 100% { transform: translateX(0); } 10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); } 20%, 40%, 60%, 80% { transform: translateX(10px); } }
      .animate-shake { animation: shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97) both; }
      .modal-content { animation: modalIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
      @keyframes modalIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
      .key-btn:active { background-color: #cbd5e1 !important; transform: scale(0.95); }
    </style>
  </head>
  <body class="bg-slate-200">
    <div id="app" class="h-screen w-full flex flex-col"></div>

    <script>
      const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSe529vS-JR9m0Yu9Pxve9ux_bPRxu5KYApjba84F885bVGrAluF3Hy5br4ngFAA6qOrGBDsQ_yzpt6/pub?output=csv";
      
      let quizzes = [];
      let state = {
        view: "home",
        playerCount: 2,
        currentIdx: 0,
        players: [],
        isDataLoaded: false,
        correctPlayer: null,
        countdown: 3
      };

      const CHO = ["ㄱ", "ㄲ", "ㄴ", "ㄷ", "ㄸ", "ㄹ", "ㅁ", "ㅂ", "ㅃ", "ㅅ", "ㅆ", "ㅇ", "ㅈ", "ㅉ", "ㅊ", "ㅋ", "ㅌ", "ㅍ", "ㅎ"];
      const JUNG = ["ㅏ", "ㅐ", "ㅑ", "ㅒ", "ㅓ", "ㅔ", "ㅕ", "ㅖ", "ㅗ", "ㅘ", "ㅙ", "ㅚ", "ㅛ", "ㅜ", "ㅝ", "ㅞ", "ㅟ", "ㅠ", "ㅡ", "ㅢ", "ㅣ"];
      const JONG = ["", "ㄱ", "ㄲ", "ㄳ", "ㄴ", "ㄵ", "ㄶ", "ㄷ", "ㄹ", "ㄺ", "ㄻ", "ㄼ", "ㄽ", "ㄾ", "ㄿ", "ㅀ", "ㅁ", "ㅂ", "ㅄ", "ㅅ", "ㅆ", "ㅇ", "ㅈ", "ㅊ", "ㅋ", "ㅌ", "ㅍ", "ㅎ"];
      const VOWEL_COMBINATIONS = { "ㅗㅏ": "ㅘ", "ㅗㅐ": "ㅙ", "ㅗㅣ": "ㅚ", "ㅜㅓ": "ㅝ", "ㅜㅔ": "ㅞ", "ㅜㅣ": "ㅟ", "ㅡㅣ": "ㅢ" };
      const KOREAN_KEYBOARD_NORMAL = [["1", "2", "3", "4", "5", "6", "7", "8", "9", "0"], ["ㅂ", "ㅈ", "ㄷ", "ㄱ", "ㅅ", "ㅛ", "ㅕ", "ㅑ", "ㅐ", "ㅔ"], ["ㅁ", "ㄴ", "ㅇ", "ㄹ", "ㅎ", "ㅗ", "ㅓ", "ㅏ", "ㅣ", "삭제"], ["Shift", "ㅋ", "ㅌ", "ㅊ", "ㅍ", "ㅠ", "ㅜ", "ㅡ", "!", "?"]];
      const KOREAN_KEYBOARD_SHIFTED = [["1", "2", "3", "4", "5", "6", "7", "8", "9", "0"], ["ㅃ", "ㅉ", "ㄸ", "ㄲ", "ㅆ", "ㅛ", "ㅕ", "ㅑ", "ㅒ", "ㅖ"], ["ㅁ", "ㄴ", "ㅇ", "ㄹ", "ㅎ", "ㅗ", "ㅓ", "ㅏ", "ㅣ", "삭제"], ["Shift", "ㅋ", "ㅌ", "ㅊ", "ㅍ", "ㅠ", "ㅜ", "ㅡ", "!", "?"]];
      const colors = ["bg-rose-500", "bg-sky-500", "bg-amber-500", "bg-emerald-500", "bg-purple-500"];

      // CSV 파싱 및 데이터 로드 (기존 로직 유지)
      async function initData() {
        try {
          const res = await fetch(CSV_URL);
          const text = await res.text();
          const rows = text.split('\n').slice(1);
          quizzes = rows.map(r => {
            const parts = r.split(',');
            return { question: parts[0]?.trim(), answer: parts[1]?.trim() };
          }).filter(q => q.question && q.answer);
          
          for (let i = quizzes.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [quizzes[i], quizzes[j]] = [quizzes[j], quizzes[i]];
          }
          state.isDataLoaded = true;
          render();
        } catch (e) {
          console.error(e);
          state.isDataLoaded = true;
          render();
        }
      }

      function assembleHangul(chars) {
        if (!chars || chars.length === 0) return "";
        let processed = [];
        for (let i = 0; i < chars.length; i++) {
          const cur = chars[i], nxt = chars[i+1];
          if (nxt && JUNG.includes(cur) && JUNG.includes(nxt) && VOWEL_COMBINATIONS[cur+nxt]) {
            processed.push(VOWEL_COMBINATIONS[cur+nxt]); i++;
          } else { processed.push(cur); }
        }
        let res = "", i = 0;
        while (i < processed.length) {
          let c = processed[i], cho = CHO.indexOf(c);
          if (cho !== -1 && processed[i+1] && JUNG.indexOf(processed[i+1]) !== -1) {
            let jung = JUNG.indexOf(processed[i+1]), jong = 0;
            if (processed[i+2] && JONG.indexOf(processed[i+2]) !== -1) {
              if (!(processed[i+3] && JUNG.indexOf(processed[i+3]) !== -1)) {
                jong = JONG.indexOf(processed[i+2]); i += 3;
              } else { i += 2; }
            } else { i += 2; }
            res += String.fromCharCode(0xac00 + (cho * 21 + jung) * 28 + jong);
          } else { res += c; i++; }
        }
        return res;
      }

      function startGame(count) {
        state.playerCount = count;
        state.players = Array.from({ length: count }, () => ({ answerChars: [], score: 0, isShifted: false }));
        state.view = "playing";
        render();
      }

      // 개별 플레이어 입력 처리 (부분 업데이트)
      window.handleInput = (pIdx, key) => {
        if (state.correctPlayer !== null) return;
        const p = state.players[pIdx];
        if (key === 'Shift') {
          p.isShifted = !p.isShifted;
        } else if (key === '삭제') {
          p.answerChars.pop();
        } else {
          p.answerChars.push(key);
          p.isShifted = false;
        }
        updatePlayerUI(pIdx);
      };

      window.checkAnswer = (pIdx) => {
        if (state.correctPlayer !== null) return;
        const p = state.players[pIdx];
        const target = quizzes[state.currentIdx].answer.replace(/\s/g, "").toUpperCase();
        const current = assembleHangul(p.answerChars).replace(/\s/g, "").toUpperCase();
        
        if (target === current) {
          p.score += 10;
          state.correctPlayer = pIdx + 1;
          showResultModal();
        } else {
          const card = document.getElementById(`player-card-${pIdx}`);
          card.classList.add('animate-shake', 'bg-rose-100');
          setTimeout(() => card.classList.remove('animate-shake', 'bg-rose-100'), 500);
        }
      };

      // 특정 플레이어의 UI만 업데이트 (성능 최적화)
      function updatePlayerUI(pIdx) {
        const p = state.players[pIdx];
        const display = document.getElementById(`display-${pIdx}`);
        if (display) display.innerText = assembleHangul(p.answerChars) || "대기...";
        
        const kbContainer = document.getElementById(`kb-${pIdx}`);
        const layout = p.isShifted ? KOREAN_KEYBOARD_SHIFTED : KOREAN_KEYBOARD_NORMAL;
        kbContainer.innerHTML = layout.map(row => `
          <div class="flex justify-center gap-0.5">
            ${row.map(k => `
              <button onpointerdown="handleInput(${pIdx}, '${k}')" class="flex-1 h-10 ${k==='삭제'?'bg-rose-500 text-white':k==='Shift'?(p.isShifted?'bg-blue-600 text-white':'bg-slate-400 text-white'):'bg-white'} rounded shadow text-[10px] font-bold key-btn">
                ${k === 'Shift' ? '⇧' : k}
              </button>
            `).join('')}
          </div>
        `).join('');
      }

      function showResultModal() {
        render(); // 모달 표시를 위해 전체 렌더링
        state.countdown = 3;
        const timer = setInterval(() => {
          state.countdown--;
          if (state.countdown <= 0) {
            clearInterval(timer);
            state.currentIdx++;
            if (state.currentIdx < quizzes.length) {
              state.correctPlayer = null;
              state.players.forEach(p => p.answerChars = []);
              render();
            } else {
              state.view = "result";
              render();
            }
          } else {
            const el = document.getElementById("modal-cd");
            if (el) el.innerText = state.countdown;
          }
        }, 1000);
      }

      function render() {
        const app = document.getElementById("app");
        if (state.view === "home") {
          app.innerHTML = `<div class="h-screen bg-[#020617] flex flex-col items-center justify-center text-white">
            <h1 class="text-8xl font-black italic mb-12 text-blue-500">QUIZ BATTLE</h1>
            <div class="flex gap-4">
              ${[2,3,4,5].map(n => `<button onclick="startGame(${n})" class="bg-white text-slate-900 p-8 rounded-3xl font-black text-2xl hover:bg-blue-500 hover:text-white transition-all">${n}인용</button>`).join('')}
            </div>
          </div>`;
        } else if (state.view === "playing") {
          const q = quizzes[state.currentIdx];
          app.innerHTML = `
            <div class="h-[25vh] bg-[#020617] text-white flex flex-col items-center justify-center p-4 relative">
              <div class="absolute top-4 left-4 bg-blue-600 px-4 py-1 rounded-lg">Q ${state.currentIdx + 1}</div>
              <h2 class="text-5xl font-black text-center break-keep">${q.question}</h2>
            </div>
            <div class="flex-1 flex overflow-hidden">
              ${state.players.map((p, i) => `
                <div id="player-card-${i}" class="flex-1 flex flex-col border-r border-slate-300 bg-white transition-colors">
                  <div class="${colors[i]} text-white p-2 flex justify-between font-bold">
                    <span>PLAYER ${i+1}</span><span>${p.score}pt</span>
                  </div>
                  <div id="display-${i}" class="flex-1 flex items-center justify-center text-2xl font-black p-2 text-center break-all">대기...</div>
                  <div class="p-1 bg-slate-100">
                    <div id="kb-${i}" class="flex flex-col gap-0.5 mb-1"></div>
                    <button onpointerdown="checkAnswer(${i})" class="w-full h-12 bg-blue-600 text-white rounded-lg font-black shadow-lg active:bg-blue-800">제 출</button>
                  </div>
                </div>
              `).join('')}
            </div>
            ${state.correctPlayer ? `
              <div class="absolute inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50">
                <div class="modal-content ${colors[state.correctPlayer-1]} p-20 rounded-[3rem] text-center text-white border-8 border-white/30">
                  <h3 class="text-6xl font-black mb-4">정답!</h3>
                  <p class="text-3xl mb-8">PLAYER ${state.correctPlayer}</p>
                  <div id="modal-cd" class="text-9xl font-black">${state.countdown}</div>
                </div>
              </div>
            ` : ''}
          `;
          state.players.forEach((_, i) => updatePlayerUI(i));
        } else if (state.view === "result") {
          const winner = [...state.players].map((p,i)=>({...p, id:i+1})).sort((a,b)=>b.score-a.score)[0];
          app.innerHTML = `<div class="h-screen bg-[#020617] flex flex-col items-center justify-center text-white">
            <h2 class="text-4xl font-black mb-4">최종 우승</h2>
            <h1 class="text-9xl font-black text-yellow-400 mb-12 italic">PLAYER ${winner.id}</h1>
            <button onclick="location.reload()" class="bg-blue-600 p-6 rounded-2xl text-2xl font-black">다시 시작</button>
          </div>`;
        }
        lucide.createIcons();
      }

      window.onload = initData;
    </script>
  </body>
</html>
