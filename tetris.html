<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>NEON TETRIS</title>
    <style>
      /* 세련된 다크 모드 및 네온 스타일 설정 */
      body {
        background-color: #0b0e14;
        color: #00d4ff;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        overflow: hidden;
      }

      h1 {
        font-size: 3rem;
        margin-bottom: 10px;
        text-shadow: 0 0 10px #00d4ff, 0 0 20px #00d4ff;
        letter-spacing: 5px;
      }

      #game-wrapper {
        display: flex;
        padding: 20px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(0, 212, 255, 0.2);
      }

      canvas {
        border: 3px solid #00d4ff;
        background-color: #000;
        box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        border-radius: 5px;
      }

      #ui-side {
        margin-left: 30px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        width: 180px;
      }

      .stat-box {
        background: rgba(0, 0, 0, 0.6);
        padding: 15px;
        border-radius: 10px;
        border-left: 4px solid #00d4ff;
        margin-bottom: 15px;
      }

      .stat-label {
        font-size: 0.8rem;
        color: #888;
        text-transform: uppercase;
      }
      .stat-value {
        font-size: 1.5rem;
        font-weight: bold;
        color: #fff;
      }

      #next-canvas {
        background: #000;
        border: 1px solid #333;
        margin-top: 10px;
      }

      button {
        padding: 15px 30px;
        font-size: 1.2rem;
        font-weight: bold;
        background: transparent;
        color: #00d4ff;
        border: 2px solid #00d4ff;
        border-radius: 50px;
        cursor: pointer;
        transition: all 0.3s;
        margin-top: 20px;
        box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
      }

      button:hover {
        background: #00d4ff;
        color: #000;
        box-shadow: 0 0 30px #00d4ff;
      }
    </style>
  </head>
  <body>
    <h1>TETRIS</h1>

    <div id="game-wrapper">
      <canvas id="tetris" width="240" height="480"></canvas>

      <div id="ui-side">
        <div class="stat-box">
          <div class="stat-label">Score</div>
          <div id="score" class="stat-value">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Next</div>
          <canvas id="next" width="100" height="100"></canvas>
        </div>
        <div style="font-size: 0.8rem; color: #555; line-height: 1.6">
          <b>CONTROLS</b><br />
          ← → : Move<br />
          ↑ : Rotate<br />
          ↓ : Fast Drop<br />
          Space : Hard Drop
        </div>
        <button onclick="resetGame()">RESET</button>
      </div>
    </div>

    <script>
      const canvas = document.getElementById("tetris");
      const context = canvas.getContext("2d");
      const nextCanvas = document.getElementById("next");
      const nextContext = nextCanvas.getContext("2d");

      context.scale(24, 24);
      nextContext.scale(20, 20);

      // 블록 색상 (네온 테마)
      const colors = [
        null,
        "#00f0f0", // I (Cyan)
        "#0000f0", // J (Blue)
        "#f0a000", // L (Orange)
        "#f0f000", // O (Yellow)
        "#00f000", // S (Green)
        "#a000f0", // T (Purple)
        "#f00000", // Z (Red)
      ];

      // 블록 충돌 감지
      function collide(arena, player) {
        const [m, o] = [player.matrix, player.pos];
        for (let y = 0; y < m.length; ++y) {
          for (let x = 0; x < m[y].length; ++x) {
            if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
              return true;
            }
          }
        }
        return false;
      }

      // 게임판 생성
      function createMatrix(w, h) {
        const matrix = [];
        while (h--) matrix.push(new Array(w).fill(0));
        return matrix;
      }

      // 블록 모양 생성
      function createPiece(type) {
        if (type === "I")
          return [
            [0, 1, 0, 0],
            [0, 1, 0, 0],
            [0, 1, 0, 0],
            [0, 1, 0, 0],
          ];
        else if (type === "L")
          return [
            [0, 2, 0],
            [0, 2, 0],
            [0, 2, 2],
          ];
        else if (type === "J")
          return [
            [0, 3, 0],
            [0, 3, 0],
            [3, 3, 0],
          ];
        else if (type === "O")
          return [
            [4, 4],
            [4, 4],
          ];
        else if (type === "Z")
          return [
            [5, 5, 0],
            [0, 5, 5],
            [0, 0, 0],
          ];
        else if (type === "S")
          return [
            [0, 6, 6],
            [6, 6, 0],
            [0, 0, 0],
          ];
        else if (type === "T")
          return [
            [0, 7, 0],
            [7, 7, 7],
            [0, 0, 0],
          ];
      }

      // 화면 그리기
      function draw() {
        context.fillStyle = "#000";
        context.fillRect(0, 0, canvas.width, canvas.height);

        drawMatrix(arena, { x: 0, y: 0 }, context);
        drawMatrix(player.matrix, player.pos, context);
      }

      function drawMatrix(matrix, offset, ctx) {
        matrix.forEach((row, y) => {
          row.forEach((value, x) => {
            if (value !== 0) {
              ctx.shadowBlur = 10;
              ctx.shadowColor = colors[value];
              ctx.fillStyle = colors[value];
              ctx.fillRect(x + offset.x, y + offset.y, 0.9, 0.9);
              ctx.shadowBlur = 0;
            }
          });
        });
      }

      function drawNext() {
        nextContext.fillStyle = "#000";
        nextContext.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
        drawMatrix(nextPiece, { x: 1, y: 1 }, nextContext);
      }

      // 블록 합치기 및 줄 지우기
      function merge(arena, player) {
        player.matrix.forEach((row, y) => {
          row.forEach((value, x) => {
            if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
          });
        });
      }

      function arenaSweep() {
        let rowCount = 1;
        outer: for (let y = arena.length - 1; y > 0; --y) {
          for (let x = 0; x < arena[y].length; ++x) {
            if (arena[y][x] === 0) continue outer;
          }
          const row = arena.splice(y, 1)[0].fill(0);
          arena.unshift(row);
          ++y;
          player.score += rowCount * 10;
          rowCount *= 2;
        }
        updateScore();
      }

      // 회전
      function rotate(matrix, dir) {
        for (let y = 0; y < matrix.length; ++y) {
          for (let x = 0; x < y; ++x) {
            [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
          }
        }
        if (dir > 0) matrix.forEach((row) => row.reverse());
        else matrix.reverse();
      }

      function playerDrop() {
        player.pos.y++;
        if (collide(arena, player)) {
          player.pos.y--;
          merge(arena, player);
          playerReset();
          arenaSweep();
        }
        dropCounter = 0;
      }

      function playerMove(dir) {
        player.pos.x += dir;
        if (collide(arena, player)) player.pos.x -= dir;
      }

      let nextPiece = createPiece("ILJOTSZ"[Math.floor(Math.random() * 7)]);

      function playerReset() {
        const pieces = "ILJOTSZ";
        player.matrix = nextPiece;
        nextPiece = createPiece(pieces[Math.floor(Math.random() * pieces.length)]);
        player.pos.y = 0;
        player.pos.x = ((arena[0].length / 2) | 0) - ((player.matrix[0].length / 2) | 0);

        if (collide(arena, player)) {
          arena.forEach((row) => row.fill(0));
          player.score = 0;
          updateScore();
        }
        drawNext();
      }

      function playerRotate(dir) {
        const pos = player.pos.x;
        let offset = 1;
        rotate(player.matrix, dir);
        while (collide(arena, player)) {
          player.pos.x += offset;
          offset = -(offset + (offset > 0 ? 1 : -1));
          if (offset > player.matrix[0].length) {
            rotate(player.matrix, -dir);
            player.pos.x = pos;
            return;
          }
        }
      }

      let dropCounter = 0;
      let dropInterval = 1000;
      let lastTime = 0;

      function update(time = 0) {
        const deltaTime = time - lastTime;
        lastTime = time;
        dropCounter += deltaTime;
        if (dropCounter > dropInterval) playerDrop();
        draw();
        requestAnimationFrame(update);
      }

      function updateScore() {
        document.getElementById("score").innerText = player.score;
      }

      function resetGame() {
        arena.forEach((row) => row.fill(0));
        player.score = 0;
        playerReset();
        updateScore();
      }

      const arena = createMatrix(10, 20);
      const player = {
        pos: { x: 0, y: 0 },
        matrix: null,
        score: 0,
      };

      document.addEventListener("keydown", (event) => {
        if (event.keyCode === 37) playerMove(-1);
        else if (event.keyCode === 39) playerMove(1);
        else if (event.keyCode === 40) playerDrop();
        else if (event.keyCode === 38) playerRotate(1);
        else if (event.keyCode === 32) {
          // Space - Hard Drop
          while (!collide(arena, player)) player.pos.y++;
          player.pos.y--;
          playerDrop();
        }
      });

      playerReset();
      update();
    </script>
  </body>
</html>
