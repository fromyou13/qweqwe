<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>영어 단어 플래시카드</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Noto Sans KR", sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        overflow-x: hidden;
        padding: 0;
      }

      .welcome-screen {
        text-align: center;
        padding: 60px 30px;
      }

      .welcome-icon {
        font-size: 6em;
        margin-bottom: 20px;
        animation: bounce 2s ease infinite;
      }

      @keyframes bounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-20px);
        }
      }

      .welcome-title {
        font-size: 3em;
        color: #667eea;
        margin-bottom: 15px;
        font-weight: 900;
        line-height: 1.2;
      }

      .welcome-subtitle {
        font-size: 1.3em;
        color: #64748b;
        margin-bottom: 50px;
        font-weight: 600;
      }

      .feature-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 20px;
        margin-bottom: 50px;
        max-width: 700px;
        margin-left: auto;
        margin-right: auto;
      }

      .feature-item {
        background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        padding: 25px;
        border-radius: 20px;
        transition: all 0.3s;
        border: 2px solid transparent;
      }

      .feature-item:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        border-color: #667eea;
      }

      .feature-icon {
        font-size: 2.5em;
        margin-bottom: 10px;
      }

      .feature-text {
        font-size: 0.95em;
        color: #475569;
        font-weight: 700;
      }

      .btn-start {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 20px 60px;
        font-size: 1.5em;
        font-weight: 900;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
        transition: all 0.3s;
        display: inline-block;
      }

      .btn-start:hover {
        transform: translateY(-5px);
        box-shadow: 0 20px 50px rgba(102, 126, 234, 0.5);
      }

      .setup-screen {
        animation: slideIn 0.4s ease;
        display: none;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .back-btn {
        background: none;
        border: none;
        color: #667eea;
        font-size: 1em;
        font-weight: 700;
        cursor: pointer;
        padding: 10px;
        margin-bottom: 20px;
        transition: all 0.3s;
        display: none;
      }

      .header {
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(10px);
        padding: 20px;
        text-align: center;
        color: white;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        display: none;
      }

      .header.show {
        display: block;
      }

      .header h1 {
        font-size: 2em;
        margin-bottom: 10px;
        font-weight: 900;
      }

      .settings-section {
        background: rgba(255, 255, 255, 0.95);
        margin: 20px;
        border-radius: 25px;
        box-shadow: 0 15px 50px rgba(0, 0, 0, 0.2);
        max-width: 900px;
        width: calc(100% - 40px);
        margin-left: auto;
        margin-right: auto;
        margin-top: 50px;
      }

      .settings-title {
        font-size: 1.5em;
        color: #667eea;
        margin-bottom: 25px;
        font-weight: 900;
        text-align: center;
      }

      .setup-screen {
        padding: 30px;
      }

      .input-group {
        margin-bottom: 15px;
        display: none;
      }

      .input-group label {
        display: block;
        margin-bottom: 8px;
        color: #4a5568;
        font-weight: 700;
        font-size: 0.95em;
      }

      .input-group input {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e2e8f0;
        border-radius: 10px;
        font-size: 1em;
        transition: all 0.3s;
      }

      .input-group input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }

      .help-text {
        font-size: 0.85em;
        color: #718096;
        margin-top: 5px;
        line-height: 1.5;
      }

      .help-text a {
        color: #667eea;
        text-decoration: none;
        font-weight: 700;
      }

      .help-text a:hover {
        text-decoration: underline;
      }

      .btn {
        padding: 15px 40px;
        font-size: 1.1em;
        font-weight: 900;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s;
        display: inline-block;
        text-align: center;
      }

      .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
      }

      .btn-primary:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 35px rgba(102, 126, 234, 0.5);
      }

      .btn-secondary {
        background: white;
        color: #667eea;
        border: 2px solid #667eea;
      }

      .btn-secondary:hover {
        background: #667eea;
        color: white;
        transform: translateY(-2px);
      }

      .button-group {
        display: flex;
        gap: 15px;
        justify-content: center;
        margin-top: 25px;
      }

      .main-container {
        display: none;
        flex: 1;
        padding: 20px;
        max-width: 1200px;
        width: 100%;
        margin: 0 auto;
      }

      .progress-bar {
        background: rgba(255, 255, 255, 0.2);
        height: 8px;
        border-radius: 10px;
        margin-bottom: 20px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #4ade80, #22c55e);
        border-radius: 10px;
        transition: width 0.5s;
        box-shadow: 0 0 10px rgba(34, 197, 94, 0.5);
      }

      .stats {
        display: flex;
        gap: 15px;
        margin-bottom: 30px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .stat-card {
        background: rgba(255, 255, 255, 0.95);
        padding: 15px 25px;
        border-radius: 15px;
        text-align: center;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
      }

      .stat-label {
        font-size: 0.85em;
        color: #64748b;
        margin-bottom: 5px;
        font-weight: 700;
      }

      .stat-value {
        font-size: 1.8em;
        font-weight: 900;
        color: #667eea;
      }

      .card-container {
        perspective: 1000px;
        margin-bottom: 30px;
        display: flex;
        justify-content: center;
      }

      .card {
        width: 100%;
        max-width: 600px;
        height: 400px;
        position: relative;
        transform-style: preserve-3d;
        transition: transform 0.6s;
        cursor: pointer;
      }

      .card.flipped {
        transform: rotateY(180deg);
      }

      .card-face {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        border-radius: 25px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 40px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      }

      .card-front {
        background: white;
      }

      .card-back {
        background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        transform: rotateY(180deg);
      }

      .word {
        font-size: 3.5em;
        font-weight: 900;
        color: #667eea;
        margin-bottom: 20px;
        word-break: break-word;
      }

      .meaning {
        font-size: 2.5em;
        font-weight: 700;
        color: white;
        text-align: center;
        line-height: 1.4;
      }

      .hint {
        font-size: 1em;
        color: #94a3b8;
        margin-top: 15px;
        text-align: center;
      }

      .controls {
        display: flex;
        gap: 20px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .control-btn {
        padding: 18px 35px;
        font-size: 1.1em;
        font-weight: 900;
        border: none;
        border-radius: 15px;
        cursor: pointer;
        transition: all 0.3s;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15);
      }

      .btn-prev {
        background: #94a3b8;
        color: white;
      }

      .btn-prev:hover {
        background: #64748b;
        transform: translateY(-2px);
      }

      .btn-next {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
      }

      .btn-next:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 30px rgba(102, 126, 234, 0.4);
      }

      .btn-bookmark {
        background: #fbbf24;
        color: white;
      }

      .btn-bookmark:hover {
        background: #f59e0b;
        transform: translateY(-2px);
      }

      .btn-bookmark.active {
        background: #dc2626;
      }

      .btn-shuffle {
        background: #8b5cf6;
        color: white;
      }

      .btn-shuffle:hover {
        background: #7c3aed;
        transform: translateY(-2px);
      }

      .message {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.85);
        color: white;
        padding: 15px 30px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        z-index: 1000;
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
      }

      .message.show {
        opacity: 1;
      }

      .loading {
        text-align: center;
        padding: 40px;
        color: white;
        font-size: 1.3em;
      }

      .error {
        background: rgba(239, 68, 68, 0.95);
        color: white;
        padding: 20px;
        border-radius: 15px;
        margin: 20px;
        text-align: center;
      }

      .card-index {
        position: absolute;
        top: 20px;
        right: 25px;
        font-size: 1.1em;
        font-weight: 700;
        color: #94a3b8;
      }

      @media (max-width: 768px) {
        .settings-section {
          margin: 15px;
          padding: 20px;
          width: calc(100% - 30px);
          margin-top: 30px;
        }

        .welcome-icon {
          font-size: 4em;
        }

        .welcome-title {
          font-size: 2em;
        }

        .welcome-subtitle {
          font-size: 1.1em;
        }

        .btn-start {
          padding: 18px 45px;
          font-size: 1.3em;
        }

        .feature-grid {
          grid-template-columns: repeat(2, 1fr);
          gap: 15px;
        }

        .feature-item {
          padding: 20px 15px;
        }

        .feature-icon {
          font-size: 2em;
        }

        .feature-text {
          font-size: 0.85em;
        }

        .word {
          font-size: 2.5em;
        }

        .meaning {
          font-size: 1.8em;
        }

        .card {
          height: 350px;
        }

        .control-btn {
          padding: 15px 25px;
          font-size: 1em;
        }

        .button-group {
          flex-direction: column;
        }

        .btn {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>📚 영어 단어 플래시카드</h1>
    </div>

    <div class="settings-section" id="settingsSection">
      <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-icon">📚</div>
        <h1 class="welcome-title">영어 단어 플래시카드</h1>
        <p class="welcome-subtitle">재미있게 단어를 외워보세요!</p>

        <div class="feature-grid">
          <div class="feature-item">
            <div class="feature-icon">🔄</div>
            <div class="feature-text">카드 넘기기</div>
          </div>
          <div class="feature-item">
            <div class="feature-icon">⭐</div>
            <div class="feature-text">북마크 기능</div>
          </div>
          <div class="feature-item">
            <div class="feature-icon">🔀</div>
            <div class="feature-text">랜덤 섞기</div>
          </div>
          <div class="feature-item">
            <div class="feature-icon">📈</div>
            <div class="feature-text">진행률 표시</div>
          </div>
        </div>

        <button class="btn btn-start" onclick="startFromDefault()">🚀 시작하기</button>
      </div>
    </div>

    <div class="main-container" id="mainContainer">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <div class="stats">
        <div class="stat-card">
          <div class="stat-label">전체</div>
          <div class="stat-value" id="totalCount">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">현재</div>
          <div class="stat-value" id="currentIndex">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">북마크</div>
          <div class="stat-value" id="bookmarkCount">0</div>
        </div>
      </div>

      <div class="card-container">
        <div class="card" id="flashcard" onclick="flipCard()">
          <div class="card-face card-front">
            <div class="card-index" id="cardIndex">1 / 10</div>
            <div class="word" id="wordText">Loading...</div>
            <div class="hint">카드를 클릭하여 뜻 보기</div>
          </div>
          <div class="card-face card-back">
            <div class="meaning" id="meaningText">의미</div>
          </div>
        </div>
      </div>

      <div class="controls">
        <button class="control-btn btn-prev" onclick="prevCard()">◀ 이전</button>
        <button class="control-btn btn-bookmark" id="bookmarkBtn" onclick="toggleBookmark()">⭐ 북마크</button>
        <button class="control-btn btn-shuffle" onclick="shuffleCards()">🔀 섞기</button>
        <button class="control-btn btn-next" onclick="nextCard()">다음 ▶</button>
      </div>
    </div>

    <div class="message" id="message"></div>

    <script>
      // ========================================
      // 여기에 기본 스프레드시트 URL을 설정하세요
      // ========================================
      const DEFAULT_SHEET_URL = "https://docs.google.com/spreadsheets/d/1jri673HYqudaNavunCoziG74-l6u4oBRmk0Aa-QREF8/edit?gid=0#gid=0";
      // 예시: const DEFAULT_SHEET_URL = 'https://docs.google.com/spreadsheets/d/1L6rFxQbV9a3bUZvpN-yPJHKoZzTWG0YM-iWFNdH_abc/edit';

      let words = [];
      let currentIndex = 0;
      let bookmarked = new Set();
      let isFlipped = false;

      function showMessage(text) {
        const msg = document.getElementById("message");
        msg.textContent = text;
        msg.classList.add("show");
        setTimeout(() => msg.classList.remove("show"), 2000);
      }

      function startFromDefault() {
        if (!DEFAULT_SHEET_URL) {
          alert("관리자가 스프레드시트 URL을 설정하지 않았습니다.\n코드의 DEFAULT_SHEET_URL을 설정해주세요.");
          return;
        }
        loadFromSheet(DEFAULT_SHEET_URL);
      }

      function showManualInput() {
        const input = prompt("단어를 입력하세요.\n형식: 영어단어1:뜻1, 영어단어2:뜻2\n예시: apple:사과, banana:바나나");
        if (!input) return;

        const pairs = input.split(",").map((p) => p.trim());
        words = pairs
          .map((pair) => {
            const [word, meaning] = pair.split(":").map((s) => s.trim());
            return { word, meaning };
          })
          .filter((w) => w.word && w.meaning);

        if (words.length > 0) {
          startStudy();
        } else {
          alert("올바른 형식으로 입력해주세요.");
        }
      }

      async function loadFromSheet(url) {
        if (!url) {
          alert("스프레드시트 URL이 설정되지 않았습니다.");
          return;
        }

        try {
          const sheetId = extractSheetId(url);
          if (!sheetId) {
            alert("올바른 구글 스프레드시트 URL이 아닙니다.");
            return;
          }

          showMessage("불러오는 중...");

          const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv`;
          const response = await fetch(csvUrl);

          if (!response.ok) {
            throw new Error("스프레드시트를 불러올 수 없습니다. 공유 설정을 확인해주세요.");
          }

          const text = await response.text();
          const lines = text.split("\n").filter((line) => line.trim());

          words = lines
            .slice(1)
            .map((line) => {
              const parts = line.split(",");
              if (parts.length >= 2) {
                return {
                  word: parts[0].trim().replace(/"/g, ""),
                  meaning: parts[1].trim().replace(/"/g, ""),
                };
              }
              return null;
            })
            .filter((w) => w && w.word && w.meaning);

          if (words.length === 0) {
            alert("데이터가 없습니다. 스프레드시트에 단어를 입력해주세요.\nA열: 영어단어, B열: 한글뜻");
            return;
          }

          startStudy();
          showMessage(`${words.length}개의 단어를 불러왔습니다!`);
        } catch (error) {
          alert("오류: " + error.message);
        }
      }

      function extractSheetId(url) {
        const match = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
        return match ? match[1] : null;
      }

      function startStudy() {
        document.getElementById("settingsSection").style.display = "none";
        document.getElementById("mainContainer").style.display = "block";
        document.querySelector(".header").classList.add("show");
        currentIndex = 0;
        updateCard();
        updateStats();
      }

      function updateCard() {
        if (words.length === 0) return;

        const card = document.getElementById("flashcard");
        card.classList.remove("flipped");
        isFlipped = false;

        const word = words[currentIndex];
        document.getElementById("wordText").textContent = word.word;
        document.getElementById("meaningText").textContent = word.meaning;
        document.getElementById("cardIndex").textContent = `${currentIndex + 1} / ${words.length}`;

        const bookmarkBtn = document.getElementById("bookmarkBtn");
        if (bookmarked.has(currentIndex)) {
          bookmarkBtn.classList.add("active");
          bookmarkBtn.textContent = "❤️ 북마크됨";
        } else {
          bookmarkBtn.classList.remove("active");
          bookmarkBtn.textContent = "⭐ 북마크";
        }

        updateStats();
      }

      function updateStats() {
        document.getElementById("totalCount").textContent = words.length;
        document.getElementById("currentIndex").textContent = currentIndex + 1;
        document.getElementById("bookmarkCount").textContent = bookmarked.size;

        const progress = ((currentIndex + 1) / words.length) * 100;
        document.getElementById("progressFill").style.width = progress + "%";
      }

      function flipCard() {
        const card = document.getElementById("flashcard");
        card.classList.toggle("flipped");
        isFlipped = !isFlipped;
      }

      function nextCard() {
        currentIndex = (currentIndex + 1) % words.length;
        updateCard();
      }

      function prevCard() {
        currentIndex = (currentIndex - 1 + words.length) % words.length;
        updateCard();
      }

      function toggleBookmark() {
        if (bookmarked.has(currentIndex)) {
          bookmarked.delete(currentIndex);
          showMessage("북마크 해제");
        } else {
          bookmarked.add(currentIndex);
          showMessage("북마크 추가");
        }
        updateCard();
      }

      function shuffleCards() {
        for (let i = words.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [words[i], words[j]] = [words[j], words[i]];
        }
        currentIndex = 0;
        bookmarked.clear();
        updateCard();
        showMessage("카드를 섞었습니다!");
      }

      document.addEventListener("keydown", (e) => {
        if (document.getElementById("mainContainer").style.display === "none") return;

        if (e.key === " ") {
          e.preventDefault();
          flipCard();
        } else if (e.key === "ArrowRight") {
          nextCard();
        } else if (e.key === "ArrowLeft") {
          prevCard();
        } else if (e.key === "b" || e.key === "B") {
          toggleBookmark();
        }
      });

      window.onload = () => {
        // 페이지 로드 시 웰컴 화면 표시
      };
    </script>
  </body>
</html>
